
name: Predictive Maintenance ML Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      # You may need to specify other environment variables if your notebook requires them

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9' # Ensure this matches your Colab environment or desired Python version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install jupyter nbconvert # Required to convert and execute notebooks

    - name: Execute Colab Notebook
      # Assuming your main notebook is named 'predictive_maintenance_notebook.ipynb'
      # and located in the root of your repository.
      # This step will convert the notebook to a Python script and then execute it.
      run: |
        jupyter nbconvert --to script predictive_maintenance_notebook.ipynb
        python predictive_maintenance_notebook.py

    - name: Verify Workflow Completion
      run: |
        echo "ML Pipeline completed. Check Hugging Face Hub for updated datasets, models, and Spaces."
